default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/
  commands:
    - default: .claude/commands/
    - global: ~/.claude/commands/
  expertise:
    - default: .claude/agents/
    - global: ~/.claude/agents/

library:
  skills: 
    - name: "meta-create-expertise-file"
      description: "Creates an expertise file for a specified domain."
      source: "https://github.com/tigershark224/meta-agent-skills/tree/main/skills/create-expertise-file.md"
    - name: "meta-debugger"
      description: "meta skill for creating debugging agents to be used by a developer agent"
      source: "https://github.com/tigershark224/meta-agent-skills/tree/main/skills/debugger.md"
    - name: "meta-developer"
      description: "meta skill for creating an agent that understands a specific repo"
      source: "https://github.com/tigershark224/meta-agent-skills/tree/main/skills/developer.md"
    - name: "meta-improve"
      description: "meta skill for creating an agent that suggests improvements to itself or other agents based on their interactions and performance."
      source: "https://github.com/tigershark224/meta-agent-skills/tree/main/skills/improve.md"
    - name: "meta-integration"
      description: "meta skill for creating an agent that integrates a specific repo with other repos"
      source: "https://github.com/tigershark224/meta-agent-skills/tree/main/skills/integration.md"
    - name: "meta-suggester"
      description: "meta skill for creating an agent that suggests new improvements for a specific repo"
      source: "https://github.com/tigershark224/meta-agent-skills/tree/main/skills/suggester.md"
    - name: "meta-validator"
      description: "meta skill for creating an agent that validates the performance of other agents based on their interactions and outcomes."
      source: "https://github.com/tigershark224/meta-agent-skills/tree/main/skills/validator.md"
    - name: "vtsp-kiwi-dev-improve"
      description: "Use after significant development work on vtsp-kiwi-dev to detect drift, update the expertise file, and propagate changes to all generated companion skills. Run this periodically to keep the skill set current."
      source: "https://github.com/vtprodesign-inc/vtsp-claude-skills/tree/main/skills/vtsp-kiwi-dev-improve.md"
  agents:
    - name: "vtsp-kiwi-dev-developer"
      description: "Use when developing firmware features, debugging issues, adding new blocks, or understanding the architecture of the vtsp-kiwi-dev ESP32-P4 firmware codebase."
      source: "https://github.com/vtprodesign-inc/vtsp-claude-skills/tree/main/agents/vtsp-kiwi-dev-developer.md"
    - name: "vtsp-kiwi-dev-debugger"
      description: "Use when diagnosing bugs, triaging failures, or investigating unexpected behavior in the vtsp-kiwi-dev ESP32-P4 firmware codebase."
      source: "https://github.com/vtprodesign-inc/vtsp-claude-skills/tree/main/agents/vtsp-kiwi-dev-debugger.md"
    - name: "vtsp-kiwi-dev-validator"
      description: "Use when writing test cases, verifying fixes, or validating that changes to vtsp-kiwi-dev firmware meet VTSP protocol conventions and build cleanly."
      source: "https://github.com/vtprodesign-inc/vtsp-claude-skills/tree/main/agents/vtsp-kiwi-dev-validator.md"
    - name: "vtsp-kiwi-dev-suggester"
      description: "Use when looking for improvements, creative ideas, or things you might have missed in the vtsp-kiwi-dev firmware. Read-only — analyzes and suggests but does not make changes."
      source: "https://github.com/vtprodesign-inc/vtsp-claude-skills/tree/main/agents/vtsp-kiwi-dev-suggester.md"
    - name: "vtsp-kiwi-dev-integration"
      description: "Use when wiring vtsp-kiwi-dev into the larger VTSP system, adding new integration pathways, or diagnosing cross-repo communication failures between the firmware, daemon, and app clients."
      source: "https://github.com/vtprodesign-inc/vtsp-claude-skills/tree/main/agents/vtsp-kiwi-dev-integration.md"
  prompts: []
  commands:
    - name: "generate-developer"
      description: "Invoke the meta-developer skill using two paths to generate a developer agent file for a repository."
      source: "C:/Software/meta-agent-skills/commands/generate-developer.md"
      requires: [skill:meta-developer]
    - name: "meta-create-developer-command"
      description: "meta command for creating a developer agent."
      source: "https://github.com/tigershark224/meta-agent-skills/tree/main/commands/generate-developer.md"
    - name: "prime-with-developer"
      description: "Load a developer agent file and use it to prime the current session's context — reads the agent file, executes its Context Priming section, and summarizes the repo."
      source: "C:/Software/meta-agent-skills/commands/prime-with-developer.md"
      requires: [command:generate-developer]
  expertise:
    - name: "vtsp-kiwi-dev-expertise"
      description: "Structured mental model of the vtsp-kiwi-dev ESP32-P4 firmware codebase. Tracks checkpoints for drift detection."
      source: "https://github.com/vtprodesign-inc/vtsp-claude-skills/tree/main/agents/expertise.yaml"
      paired_skill: "vtsp-kiwi-dev-improve"
